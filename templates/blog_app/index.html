{% extends 'blog_app/base.html' %}

{% block content %}
<h1>Styled Blog Posts</h1>
<div id="posts-container"></div>
<button id="load-posts" class="btn btn-primary mb-3">Load Posts</button>
{% endblock %}

{% block extra_js %}
<script>
async function loadPosts() {
    try {
        const res = await fetch('/api/posts/');
        const posts = await res.json();
        const container = document.getElementById('posts-container');
        container.innerHTML = posts.results.map(post => `
            <div class="post-card card">
                <div class="card-body">
                    <h5 class="post-title card-title">${post.title}</h5>
                    <p class="post-content card-text">${post.content.substring(0, 200)}...</p>
                    <p class="card-text"><small class="text-muted">By ${post.author.username} | Likes: <span class="likes">${post.likes_count}</span> | Dislikes: <span class="dislikes">${post.dislikes_count}</span></p>
                    <button class="btn btn-success like-btn" onclick="vote(${post.id}, 1)">Like</button>
                    <button class="btn btn-danger dislike-btn" onclick="vote(${post.id}, -1)">Dislike</button>
                </div>
            </div>
        `).join('');
    } catch (e) {
        console.error(e);
    }
}
document.getElementById('load-posts').onclick = loadPosts;

async function vote(postId, vote) {
    // Get JWT token from localStorage or prompt
    const token = localStorage.getItem('token') || prompt('Enter JWT token from /api/token/');
    if (!token) return;
    const res = await fetch(`/api/posts/${postId}/vote/`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
        body: JSON.stringify({vote})
    });
    if (res.ok) loadPosts();
}
</script>
{% endblock %}
